<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - VouchSure</title>
    {% load static %}
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        header .logo img {
            width: 150px;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }

        nav ul li {
            display: inline;
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            text-align: center;
            padding: 20px;
        }

        section h2 {
            font-size: 28px;
            color: #2c3e50;
        }

        section p {
            font-size: 20px;
            color: #444;
        }

        .qr-container {
            margin-top: 20px;
        }

        .qr-container img {
            width: 250px;
            border: 5px solid #2c3e50;
            border-radius: 10px;
        }

        .payment-confirm-button {
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #004aad;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .payment-confirm-button:hover {
            background-color: #00338d; /* Optional: change color on hover */
        }

        footer {
            text-align: center;
            background: #2c3e50;
            color: white;
            padding: 10px 0;
            margin-top: 20px;
        }
    </style>
    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault(); // Disable right-click menu
        });
    </script>
</head>
<body>
    <!-- Navigation Bar -->
    <header>
        <nav>
            <div class="logo">
                <a href="{% url 'home' %}"> 
                    <img src="{% static 'images/logo.png' %}" alt="VouchSure Logo">
                </a>
            </div>
            <ul>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'vouchers' %}">Vouchers</a></li>
            </ul>
        </nav>
    </header>

    <!-- Payment Section -->
    <section>
        <h2>Payment Page</h2>
        <p>The amount for your selected voucher is ₹{{ voucher_amount }}</p>

        <div class="qr-container">
            <h3>Scan to Pay</h3>
            <img src="{% static 'images/qr-codes/qr-' %}{{ voucher_amount }}.jpg" alt="QR Code">
            <p style="margin-top: 10px; color: #666;">Use any UPI app to pay this amount</p>
        </div>

        <!-- Button to confirm payment and redirect to upload proof -->
        <a href="{% url 'upload_voucher_proof' %}" class="payment-confirm-button">I Have Paid</a>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 VouchSure. All rights reserved.</p>
    </footer>
</body>
</html>
