{% extends 'main/base.html' %}
{% load static %}
{% block content %}

<style>
  .proof-form-container {
    max-width: 500px;
    margin: 50px auto;
    padding: 30px;
    background-color: #f9f9f9;
    border-radius: 16px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    font-family: 'Poppins', sans-serif;
  }

  .proof-form-container h2 {
    text-align: center;
    color: #004aad;
    margin-bottom: 20px;
  }

  .proof-form-container p {
    text-align: center;
    margin-bottom: 15px;
    font-size: 16px;
    color: #333;
  }

  .proof-form-container form {
    display: flex;
    flex-direction: column;
    gap: 15px; /* Consistent spacing between all form elements */
  }

  .proof-form-container label {
    font-weight: bold;
    margin-bottom: 5px; /* Small space between label and input */
  }

  .proof-form-container input,
  .proof-form-container textarea {
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    width: 100%; /* Ensure inputs take full width of container */
    box-sizing: border-box; /* Include padding in width calculation */
  }

  .proof-form-container button {
    background-color: #004aad;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    width: 100%; /* Make button full width */
  }

  .proof-form-container button:hover {
    background-color: #00338d;
  }
</style>

<div class="proof-form-container">
  <h2>Upload Payment Proof</h2>

  {% if paper_amount %}
    <p>Paper Amount: <strong>₹{{ paper_amount }}</strong></p>
  {% endif %}

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div>
      <label for="paper_amount">Paper Amount:</label>
      <input type="text" name="paper_amount" id="paper_amount" readonly value="{{ paper_amount }}">
    </div>

    <div>
      <label for="phone">Phone Number:</label>
      <input type="text" name="phone" id="phone" required>
    </div>

    <div>
      <label for="email">Email:</label>
      <input type="email" name="email" id="email" placeholder="Enter your email" required>
    </div>

    <div>
      <label for="message">Message:</label>
      <input type="text" name="message" id="message" placeholder="e.g., Paid via GPay">
    </div>

    <div>
      <label for="screenshot">Upload Screenshot:</label>
      <input type="file" name="screenshot" id="screenshot" required>
    </div>

    <button type="submit">Submit</button>
  </div>
  </form>
</div>

{% if submitted %}
<script>
  window.onload = function () {
    alert("Details Sent for Verification Successfully");
    window.location.href = "/";
  };
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault(); // Disable right-click menu
});
</script>
{% endif %}

{% endblock %}
