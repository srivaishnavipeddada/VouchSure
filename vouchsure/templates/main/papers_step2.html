<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Paper - Step 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #dbeafe, #eff6ff);
            margin: 0;
            padding: 0;
        }

        .paper-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .paper-container:hover {
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
            font-size: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1e293b;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 25px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background-color: #f8fafc;
            font-size: 14px;
            transition: border 0.2s;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #2563eb;
            color: #ffffff;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #1d4ed8;
        }
    </style>
    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault(); // Disable right-click menu
        });
    </script>
</head>
<body>
    <div class="paper-container">
        <h1>Step 2: Topic & Idea</h1>
        <form method="POST">
            {% csrf_token %}
            <label for="topic">Topic Name</label>
            <input type="text" name="topic" id="topic" required>

            <label for="idea">Main Idea</label>
            <textarea name="idea" id="idea" required></textarea>

            <label for="pages">Number of Pages</label>
            <input type="number" name="pages" id="pages" min="1" required>

            <button type="submit">Next</button>
        </form>
    </div>
</body>
</html>
