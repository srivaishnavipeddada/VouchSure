<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Email Sent - VouchSure</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .message-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #005bbb;
            margin-bottom: 15px;
        }

        p {
            color: #333;
            font-size: 15px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #005bbb;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault(); // Disable right-click menu
        });
    </script>
</head>
<body>
    <div class="message-container">
        <h2>Email Sent</h2>
        <p>If an account exists with the email you provided, a password reset link has been sent to it.</p>
        <a href="{% url 'login' %}">Back to Login</a>
    </div>
</body>
</html>
